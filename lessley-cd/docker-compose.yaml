services:
  # --- RabbitMQ Service ---
  rabbitmq:
    image: rabbitmq:4.1.4-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MongoDB Service ---
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Mongo Express (MongoDB GUI) ---
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASS}
      ME_CONFIG_MONGODB_URL: mongodb://${DB_USER}:${DB_PASS}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${DB_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${DB_PASS}
    depends_on:
      - mongodb

# --- Your Microservices ---
  gateway:
    image: lessley/gateway:dev
    build:
      context: ../lessley-backend/Lessley.Gateway.Api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5202:8080"          # Map host 5002 to container 8080
    environment:
      # 1. Development Mode (Enables Swagger)
      - ASPNETCORE_ENVIRONMENT=Development

      # CRITICAL: Use the service names (rabbitmq, postgres) not localhost
      - ConnectionStrings__MongoDb=mongodb://${DB_USER}:${DB_PASS}@mongodb:27017/${DB_NAME}?authSource=admin

      # 2. JWT Config (Using double underscore __ to represent nesting)
      - JwtConfig__Key=${JWT_KEY}
      - JwtConfig__Issuer=${JWT_ISSUER}
      - JwtConfig__Audience=${JWT_AUDIENCE}

      # 3. Bootstrap Config
      - Bootstrap__Key=${BOOTSTRAP_KEY}
      - Bootstrap__Username=${BOOTSTRAP_USER}
      - Bootstrap__Password=${BOOTSTRAP_PASS}
      - Bootstrap__Email=${BOOTSTRAP_EMAIL}

      - OpenFinanceConfig__ClientId=${OpenFinanceConfig_ClientId}
      - OpenFinanceConfig__ClientSecret=${OpenFinanceConfig_ClientSecret}
    depends_on:
      - mongodb

  scraper-hot:
    image: lessley/scraper-hot:dev
    build:
      context: ../lessley-backend/Scraper
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "while true; do
      if [ \"${HOT_IMPORT_SOURCE:-file}\" = \"api\" ]; then
      python -m hot.import_businesses --from-api
      --page-start ${HOT_API_PAGE_START:-1}
      --max-pages ${HOT_API_MAX_PAGES:-2}
      --request-delay ${HOT_API_REQUEST_DELAY:-1.0}
      --mongo-uri mongodb://${DB_USER}:${DB_PASS}@mongodb:27017/${DB_NAME}?authSource=admin
      --db ${DB_NAME};
      else
      python -m hot.import_businesses --input ${HOT_OUTPUT_FILE}
      --mongo-uri mongodb://${DB_USER}:${DB_PASS}@mongodb:27017/${DB_NAME}?authSource=admin
      --db ${DB_NAME};
      fi;
      sleep ${HOT_SCRAPER_INTERVAL_SECONDS:-604800};
      done"
    environment:
      - SCRAPER_NAME=hot
      - SCRAPER_PAGE_START=${HOT_SCRAPER_PAGE_START}
      - SCRAPER_MAX_PAGES=${HOT_SCRAPER_MAX_PAGES}
      - SCRAPER_REQUEST_DELAY=${HOT_SCRAPER_REQUEST_DELAY}
      - HOT_SCRAPER_INTERVAL_SECONDS=${HOT_SCRAPER_INTERVAL_SECONDS}
      - HOT_IMPORT_SOURCE=${HOT_IMPORT_SOURCE}
      - HOT_API_PAGE_START=${HOT_API_PAGE_START}
      - HOT_API_MAX_PAGES=${HOT_API_MAX_PAGES}
      - HOT_API_REQUEST_DELAY=${HOT_API_REQUEST_DELAY}
      - HOT_OUTPUT_FILE=${HOT_OUTPUT_FILE}
      - MONGO_URI=mongodb://${DB_USER}:${DB_PASS}@mongodb:27017/${DB_NAME}?authSource=admin
      - MONGO_DATABASE=${DB_NAME}
      - MONGO_OFFERS_COLLECTION=${SCRAPER_OFFERS_COLLECTION}
      - MONGO_CARDS_COLLECTION=${SCRAPER_CARDS_COLLECTION}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    volumes:
      - ../lessley-backend/Scraper:/app
    depends_on:
      - mongodb

# Defined volumes for persistence
volumes:
  rabbitmq_data:
  mongodb_data:
